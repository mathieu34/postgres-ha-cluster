# ─────────────────────────────────────────────────────────
# pg_hba.conf — Règles d'authentification PostgreSQL
# Ce fichier contrôle QUI peut se connecter à PostgreSQL,
# DEPUIS OÙ, et avec QUELLE méthode d'authentification
#
# Format : TYPE  DATABASE  USER  ADDRESS  METHOD
# ─────────────────────────────────────────────────────────

# Connexions locales via socket Unix (depuis le même serveur)
# trust = pas de mot de passe requis (utilisé en interne par PostgreSQL)
local   all             all                                     trust

# Connexions depuis localhost (127.0.0.1) avec mot de passe MD5
host    all             all             127.0.0.1/32            md5

# Connexions depuis n'importe quelle IP externe avec mot de passe MD5
# Nécessaire pour que pgbench et les clients externes puissent se connecter
host    all             all             0.0.0.0/0               md5

# Connexions de réplication WAL streaming depuis n'importe quelle IP avec mot de passe MD5
# Le replica utilise cette règle avec le user "replicator" pour streamer le WAL depuis le primary
host    replication     all             0.0.0.0/0               md5
